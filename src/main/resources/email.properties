# =====================================================================
# Notifications email — DESACTIVEES par defaut.
#
# Pour activer :
#   1. mail.enabled=true
#   2. Renseigner un serveur SMTP. Exemple avec Gmail :
#        - mail.smtp.host=smtp.gmail.com
#        - mail.smtp.port=587
#        - mail.smtp.user=votreadresse@gmail.com
#        - mail.smtp.password=<mot de passe d'application Google>
#          (https://myaccount.google.com/apppasswords)
#
# Si desactive ou mal configure, l'application fonctionne normalement
# (les envois sont simplement ignores, sans erreur).
# =====================================================================

mail.enabled=false

mail.smtp.host=smtp.gmail.com
mail.smtp.port=587
mail.smtp.user=
mail.smtp.password=
mail.from=Association UCAD <no-reply@asso.sn>
